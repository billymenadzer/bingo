<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WYNIKI - KAMBO BINGO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f0ff; --neon-gold: #ffc107; 
            --dark-bg: #0a0a12; --card-bg: rgba(15, 15, 30, 0.85);
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--dark-bg); background-image: url('tlo_kambo.png'); background-size: cover; background-position: center; background-attachment: fixed; color: #ffffff; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(10, 10, 18, 0.9); border-bottom: 2px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); backdrop-filter: blur(5px); }
        .game-title { font-size: 2.5em; font-weight: 900; text-transform: uppercase; font-style: italic; color: #fff; text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); letter-spacing: 3px; text-decoration: none;}
        .logo-container img { height: 60px; object-fit: contain; filter: drop-shadow(0 0 8px var(--neon-cyan)); }
        
        .main-container { max-width: 1200px; width: 95%; margin: 40px auto; flex: 1; }
        .leaderboard-panel { background: var(--card-bg); border: 2px solid var(--neon-cyan); border-radius: 12px; padding: 30px; box-shadow: 0 0 25px rgba(0, 240, 255, 0.25); backdrop-filter: blur(10px); }
        
        h2 { text-align: center; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; margin-bottom: 30px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); font-size: 2em;}
        
        #datePicker { display: block; margin: 0 auto 20px auto; padding: 12px; border-radius: 6px; background: #111; color: #fff; border: 1px solid var(--neon-cyan); font-size: 1.1em; cursor: pointer; }

        .results-table { width: 100%; border-collapse: collapse; text-align: left; }
        .results-table th, .results-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .results-table th { background: rgba(0, 240, 255, 0.1); color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; }
        
        .badge-bingo { background: var(--neon-pink); color: #fff; padding: 5px 10px; border-radius: 6px; font-weight: bold; text-shadow: 0 0 5px #000; box-shadow: 0 0 10px var(--neon-pink); display: inline-block; }
        
        .btn-back { display: block; width: 250px; margin: 30px auto 0 auto; text-align: center; background: transparent; color: #fff; border: 2px solid var(--neon-pink); padding: 15px; text-transform: uppercase; font-weight: bold; border-radius: 6px; text-decoration: none; transition: 0.3s; }
        .btn-back:hover { background: var(--neon-pink); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="game-title">KAMBO BINGO!</a>
        <div class="logo-container"><img src="Billy_logo_2.png" alt="Billy Logo"></div>
    </header>

    <div class="main-container">
        <div class="leaderboard-panel">
            <h2>🏆 Loża Szyderców</h2>
            <input type="date" id="datePicker" onchange="fetchResults(this.value)">
            
            <table class="results-table">
                <thead>
                    <tr><th>Pozycja</th><th>Nick</th><th>Trafienia</th><th>BINGO</th></tr>
                </thead>
                <tbody id="public-leaderboard">
                    <tr><td colspan="4" style="text-align: center; padding: 40px; color: #888;">Ładowanie danych...</td></tr>
                </tbody>
            </table>
            <a href="index.html" class="btn-back">⬅ WRÓĆ DO GRY</a>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://szzauvjeogsdpleebrgo.supabase.co', 'sb_publishable_l2Mh9vUD84rA3CUiuj_LAQ_7z-orOnQ');

        async function fetchResults(selectedDate) {
            const tbody = document.getElementById('public-leaderboard');
            if (!selectedDate) {
                selectedDate = new Date().toISOString().split('T')[0];
                document.getElementById('datePicker').value = selectedDate;
            }

            try {
                // Pobieramy wyniki dla wybranej daty
                const { data, error } = await db
                    .from('ranking')
                    .select('zwyciezcy')
                    .eq('odcinek_data', selectedDate);
                
                if (error || !data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #888;">Brak wyników dla tej daty.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                // Pobieramy ostatni zapisany ranking z tego dnia
                const players = data[data.length - 1].zwyciezcy;

                players.forEach((player, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: bold;">#${index + 1}</td>
                        <td style="color: var(--neon-cyan); font-weight: bold;">${player.nick}</td>
                        <td><strong>${player.score} / 16</strong><br><span style="font-size: 0.8em; color: #aaa;">${player.matchedTexts || 'Brak'}</span></td>
                        <td>${player.hasBingo ? '<span class="badge-bingo">BINGO! 🎉</span>' : '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: var(--neon-pink);">Błąd połączenia.</td></tr>';
            }
        }
        fetchResults();
    </script>
</body>
</html>
