<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL SZEFA - KAMBO BINGO 3x3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f0ff; --neon-yellow: #ffeb3b;
            --dark-bg: #06060c; --card-bg: rgba(20, 20, 35, 0.9);
        }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--dark-bg); color: #fff; margin: 0; padding: 30px; }
        h1 { text-align: center; color: var(--neon-yellow); text-shadow: 0 0 10px rgba(255, 235, 59, 0.5); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .admin-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        .panel-box { background: var(--card-bg); border: 2px solid var(--neon-cyan); border-radius: 12px; padding: 25px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }
        .panel-box h2 { margin-top: 0; color: var(--neon-cyan); border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; font-size: 1.2em; }
        .phrases-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .phrase-checkbox { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; border: 1px solid transparent; }
        .phrase-checkbox:hover { background: rgba(0, 240, 255, 0.1); border-color: rgba(0, 240, 255, 0.3); }
        .phrase-checkbox input { width: 18px; height: 18px; cursor: pointer; }
        .btn-action { background: transparent; color: var(--neon-yellow); border: 2px solid var(--neon-yellow); padding: 15px 40px; font-weight: bold; font-size: 1.1em; text-transform: uppercase; border-radius: 6px; cursor: pointer; display: block; margin: 20px auto 0 auto; transition: all 0.3s; box-shadow: 0 0 10px rgba(255, 235, 59, 0.2); }
        .btn-action:hover { background: var(--neon-yellow); color: #000; box-shadow: 0 0 25px var(--neon-yellow); }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .results-table th, .results-table td { padding: 12px 15px; border-bottom: 1px solid #222; }
        .results-table th { background: rgba(0, 240, 255, 0.1); color: var(--neon-cyan); text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .badge-bingo { background: var(--neon-pink); color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; box-shadow: 0 0 8px var(--neon-pink); }
        #status-msg { text-align: center; font-weight: bold; color: var(--neon-cyan); margin-top: 15px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Kambo Bingo - Panel Szefa (3x3)</h1>

    <div class="admin-container">
        <div class="panel-box">
            <h2>Krok 0: Wybierz datę odcinka</h2>
            <input type="date" id="episodeDate" onchange="checkExistingResults()" style="padding: 10px; border-radius: 6px; background: #111; color: #fff; border: 1px solid var(--neon-cyan); width: 200px;">
            
            <h2 style="margin-top: 20px;">Krok 1: Zaznacz frazy, które padły</h2>
            <div class="phrases-selector" id="phrases-grid"></div>
            <button class="btn-action" onclick="settleEpisode()">🚀 Rozlicz Odcinek i Zapisz do Bazy</button>
            <div id="status-msg"></div>
        </div>

        <div class="panel-box">
            <h2>Krok 2: Podgląd Wyników</h2>
            <table class="results-table">
                <thead>
                    <tr><th>Pozycja</th><th>Nick Gracza</th><th>Trafione Hasła</th><th>Wynik</th><th>BINGO</th></tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="5" style="text-align: center; color: #555; padding: 30px;">Wybierz datę, aby sprawdzić bazę.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://szzauvjeogsdpleebrgo.supabase.co', 'sb_publishable_l2Mh9vUD84rA3CUiuj_LAQ_7z-orOnQ');

        const allPhrases = ["szkolasurykatki", "Adam", "Spotkanie biznesowe", "prysznic", "Junku gdzie jestes", "jedzenie dla Junku", "AngkorWat", "rynek", "kawa", "robaki dla surykatek", "mamy Gosci", "Asia sie nagrywa", "Asia patrzy z pogarda", "ooo kotki!", "niestety ale....", "ulewa", "zupa", "inwestor", "nie sprzedaje farmy", "sprzedaje farme", "mama juny", "Alan i Eco", "Ewa", "przepraszam panstwa ale...", "Brenda", "nic nie jadlem", "pySZne jedzonko", "basen", "biznes lubi cisze", "musicie Panstwo zrozumiec...", "sklep z filtrami", "nasze kiszonki", "burgery", "paluchy w zblizeniu", "lekarz / szpital/ cisnienie", "motocykl", "mamy problem", "sklep AQ", "fryzjer", "nowe koszulki", "nowe buty", "problem z pradem", "praoblem z internetem", "urodziny juny", "Tharong", "Wujek od giftow", "Swimming pool", "prezenty", "zli khmerzy", "nowe tshirty", "water proof jacket", "gas station", "express do kawy", "mamy gosci niespodziewanie", "musze jechac", "musze kupic", "poliakov", "zawleczki camodia", "pani z kiosku", "zeby paszport", "problemy z cisnieniem", "AQ filters"];
        const winningLines = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];

        function renderPhrasesGrid() {
            const grid = document.getElementById('phrases-grid');
            [...allPhrases].sort((a,b) => a.localeCompare(b, 'pl')).forEach(phrase => {
                const label = document.createElement('label');
                label.className = 'phrase-checkbox';
                label.innerHTML = `<input type="checkbox" value="${phrase}" class="phrase-input"> ${phrase}`;
                grid.appendChild(label);
            });
        }

        async function checkExistingResults() {
            const date = document.getElementById('episodeDate').value;
            if(!date) return;
            const statusDiv = document.getElementById('status-msg');
            const tbody = document.getElementById('leaderboard-body');
            statusDiv.style.color = "var(--neon-cyan)";
            statusDiv.innerText = "SPRAWDZANIE BAZY DANYCH...";

            try {
                const { data, error } = await db.from('ranking').select('*').eq('odcinek_data', date).order('created_at', { ascending: false }).limit(1);
                if (error) throw error;
                if (data && data.length > 0) {
                    renderLeaderboard(data[0].zwyciezcy);
                    statusDiv.innerHTML = `<span style="color: var(--neon-gold);">Odczytano zapisane wyniki dla daty: ${date}.<br>Jeśli rozliczysz odcinek, nadpiszesz je!</span>`;
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #555; padding: 30px;">Brak wyników w bazie. Możesz rozliczyć odcinek.</td></tr>';
                    statusDiv.innerText = "GOTOWY DO ROZLICZENIA.";
                }
            } catch (err) { statusDiv.innerHTML = `<span style="color: var(--neon-pink);">BŁĄD ODCZYTU: ${err.message}</span>`; }
        }

        async function settleEpisode() {
            const statusDiv = document.getElementById('status-msg');
            const selectedDate = document.getElementById('episodeDate').value;
            if(!selectedDate) { alert("Wybierz datę odcinka!"); return; }

            statusDiv.style.color = "var(--neon-cyan)";
            statusDiv.innerText = "ROZLICZANIE I ZAPIS DO BAZY...";
            const officialFallenPhrases = Array.from(document.querySelectorAll('.phrase-input:checked')).map(i => i.value);

            try {
                const { data: kupony, error } = await db.from('kupony').select('*').eq('odcinek_data', selectedDate);
                if (error) throw error;
                if (!kupony || kupony.length === 0) { statusDiv.innerHTML = `<span style="color: var(--neon-pink);">BRAK KUPONÓW DLA TEJ DATY!</span>`; return; }

                const processedPlayers = kupony.map(kupon => {
                    const userPhrases = kupon.hasla;
                    let hits = 0, matchedIdx = [], matchedText = [];
                    userPhrases.forEach((p, idx) => {
                        if (officialFallenPhrases.includes(p)) { hits++; matchedIdx.push(idx); matchedText.push(p); }
                    });
                    let bingo = winningLines.some(line => line.every(idx => matchedIdx.includes(idx)));
                    return { nick: kupon.nick, score: hits, hasBingo: bingo, matchedTexts: matchedText.join(', ') };
                }).sort((a,b) => (b.hasBingo - a.hasBingo) || (b.score - a.score));

                // TUTAJ JEST FIX - TERAZ SYSTEM WYEWALUJE BŁĄD, JEŚLI BAZA ODRZUCI ZAPIS
                const { error: insertError } = await db.from('ranking').insert([{ zwyciezcy: processedPlayers, odcinek_data: selectedDate }]);
                if (insertError) throw insertError;

                renderLeaderboard(processedPlayers);
                statusDiv.innerHTML = `<span style="color: #00ff00;">SUKCES! WYNIKI TWARDO ZAPISANE W BAZIE!</span>`;
            } catch (err) { 
                statusDiv.innerHTML = `<span style="color: var(--neon-pink);">FATALNY BŁĄD ZAPISU: ${err.message}</span>`; 
            }
        }

        function renderLeaderboard(players) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = players.map((p, i) => `<tr><td>#${i+1}</td><td>${p.nick}</td><td>${p.matchedTexts}</td><td>${p.score}</td><td>${p.hasBingo ? '<span class="badge-bingo">BINGO!</span>' : '-'}</td></tr>`).join('');
        }

        renderPhrasesGrid();
    </script>
</body>
</html>
