name: Kambo Skynet (Poranny Robot)

on:
  schedule:
    - cron: '30 5 * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie plików repozytorium
        uses: actions/checkout@v4  # ZAKTUALIZOWANA WERSJA

      - name: Instalowanie Pythona 3.10
        uses: actions/setup-python@v5 # ZAKTUALIZOWANA WERSJA
        with:
          python-version: '3.10'

      - name: Instalacja darmowych narzędzi i bibliotek
        run: |
          pip install youtube-transcript-api google-generativeai supabase scrapetube pytz

      - name: Uruchomienie Bota Stefana
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python kambo_bot.py
